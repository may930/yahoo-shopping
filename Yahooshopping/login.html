<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - Yahoo!ショッピング風</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="register-body">

    <header class="header">
        <div class="header-top">
            <div class="container header-top-inner">
                <span class="header-notice">送料無料をお届け！お得なキャンペーン実施中</span>
                <nav class="header-top-nav">
                    <span class="welcome-text">ようこそ、<strong>サンプル</strong> さん</span>
                </nav>
            </div>
        </div>

        <div class="header-main">
            <div class="container header-main-inner">
                <a href="index.html" class="logo">
                    <span class="logo-y">HCS!</span><span class="logo-s">ショッピング</span>
                </a>
                <div class="search-bar">
                    <input type="text" placeholder="何をお探しですか？ 商品名、カテゴリ、ブランドから探す" aria-label="商品検索">
                    <button type="submit" class="search-btn" aria-label="検索">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.35-4.35" />
                        </svg>
                        <span>検索する</span>
                    </button>
                </div>
                <div class="header-actions">
                    <a href="cart.html" class="action-item-btn">
                        <span class="action-icon">🛒</span>
                        <span class="action-label">カート</span>
                        <span class="cart-count">3</span>
                    </a>
                    <a href="browsing-history.html" class="action-item-btn">
                        <span class="action-icon">🕒</span>
                        <span class="action-label">閲覧履歴</span>
                    </a>
                    <a href="order-history.html" class="action-item-btn">
                        <span class="action-icon">⏱️</span>
                        <span class="action-label">注文履歴</span>
                    </a>
                    <a href="mypage.html" class="action-item-btn">
                        <span class="action-icon">👤</span>
                        <span class="action-label">マイページ</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="register-container">
        <div class="register-box">
            <h1 class="register-title">ログイン</h1>
            <p class="register-subtitle">登録している携帯電話番号またはメールアドレスを入力してください。</p>

            <form id="loginForm" class="form-grid">

                <div class="form-group">
                    <label for="loginIdentifier" class="form-label">携帯電話番号 または メールアドレス</label>
                    <input type="text" id="loginIdentifier" class="form-input" placeholder="example@yahoo.co.jp または 09012345678" required>
                </div>

                <button type="submit" class="submit-btn" style="margin-top: 16px;">ログイン</button>
            </form>

            <div style="text-align: center; margin-top: 24px; font-size: 0.85rem;">
                <p style="color: #666;">アカウントをお持ちでないですか？</p>
                <a href="register.html" style="color: var(--color-link); text-decoration: none; font-weight: 700; display: inline-block; margin-top: 4px;">新規会員登録はこちら</a>
            </div>
        </div>
    </main>

    <footer class="footer" style="margin-top: auto;">
        <div class="footer-bottom">
            <p>© 2026 Yahoo!ショッピング風チーム制作プロジェクト. All rights reserved.</p>
        </div>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            // 普通のフォーム送信（画面リロード）を一旦止めるばい
            event.preventDefault();

            // ここで入力チェックとか本来はするっちゃけど、今回はそのままホームへ！
            // ログイン成功した感を出すために、ちょっとだけアラートを出して遷移させるね
            alert('ログインに成功しました！ホーム画面に戻ります。');

            // ホーム画面（index.html）へ移動！
            location.href = 'index.html';
        });
    </script>

</body>
</html>
